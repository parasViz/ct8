<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 420" role="img" aria-labelledby="title desc">
  <title id="title">Weighing scale comparing two algebra expressions</title>
  <desc id="desc">Left pan shows left side expression open parenthesis a minus b close parenthesis squared. Right pan shows right side expression a squared minus b squared.</desc>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="10" flood-color="#172034" flood-opacity="0.16"/>
    </filter>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#f8fbff"/>
      <stop offset="100%" stop-color="#eef7ff"/>
    </linearGradient>
    <linearGradient id="beam" x1="0" x2="1">
      <stop offset="0%" stop-color="#315ddb"/>
      <stop offset="100%" stop-color="#e8684a"/>
    </linearGradient>
  </defs>

  <rect width="900" height="420" rx="28" fill="url(#bg)"/>
  <rect x="28" y="28" width="844" height="364" rx="22" fill="#ffffff" stroke="#d8e4f5" stroke-width="3"/>

  <text x="450" y="68" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="800" fill="#172034">Can the scale balance?</text>
  <text x="450" y="101" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="17" font-weight="700" fill="#536078">Compare the two sides for whole-number values of a and b</text>

  <g filter="url(#shadow)">
    <line x1="245" y1="172" x2="655" y2="172" stroke="url(#beam)" stroke-width="13" stroke-linecap="round"/>
    <circle cx="450" cy="172" r="18" fill="#172034"/>
    <path d="M450 190 L392 322 H508 Z" fill="#25324a"/>
    <rect x="355" y="322" width="190" height="18" rx="9" fill="#25324a"/>
    <rect x="318" y="340" width="264" height="16" rx="8" fill="#64748b"/>

    <line x1="285" y1="172" x2="214" y2="248" stroke="#64748b" stroke-width="4"/>
    <line x1="285" y1="172" x2="356" y2="248" stroke="#64748b" stroke-width="4"/>
    <path d="M180 248 H390 C379 306 191 306 180 248 Z" fill="#eef4ff" stroke="#315ddb" stroke-width="4"/>

    <line x1="615" y1="172" x2="544" y2="248" stroke="#64748b" stroke-width="4"/>
    <line x1="615" y1="172" x2="686" y2="248" stroke="#64748b" stroke-width="4"/>
    <path d="M510 248 H720 C709 306 521 306 510 248 Z" fill="#fff6ed" stroke="#e8684a" stroke-width="4"/>
  </g>

  <g>
    <rect x="154" y="126" width="262" height="92" rx="18" fill="#ffffff" stroke="#c9dcff" stroke-width="3"/>
    <text x="285" y="154" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="900" letter-spacing="1.2" fill="#315ddb">LEFT SIDE</text>
    <text x="285" y="190" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="34" font-weight="700" fill="#172034">
      (a - b)<tspan baseline-shift="super" font-size="20">2</tspan>
    </text>
  </g>

  <g>
    <rect x="484" y="126" width="262" height="92" rx="18" fill="#ffffff" stroke="#ffd2b8" stroke-width="3"/>
    <text x="615" y="154" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="900" letter-spacing="1.2" fill="#c2410c">RIGHT SIDE</text>
    <text x="615" y="190" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="34" font-weight="700" fill="#172034">
      a<tspan baseline-shift="super" font-size="20">2</tspan> - b<tspan baseline-shift="super" font-size="20">2</tspan>
    </text>
  </g>

  <g>
    <rect x="256" y="367" width="388" height="34" rx="17" fill="#f8fafc" stroke="#e2e8f0"/>
    <text x="450" y="389" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="800" fill="#475569">Find when both sides have equal value</text>
  </g>
</svg>
